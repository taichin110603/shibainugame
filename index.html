<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INU GAME</title>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>

<style>
body{
  margin:0;
  background:linear-gradient(#ffe0b2,#ffcc88);
  font-family:sans-serif;
  overflow:hidden;
  text-align:center;
}

canvas{
  display:block;
  margin:0 auto;
}

#ui{
  position:absolute;
  right:20px;
  top:20px;
  width:220px;
}

#ranking{
  background:rgba(255,255,255,0.9);
  padding:10px;
  border-radius:15px;
  height:200px;
  overflow-y:auto;
}

#gameOver{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:20px;
  display:none;
}

button{
  padding:8px 15px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#ffb74d;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="ui">
<h2>Score: <span id="score">0</span></h2>
<h3>High: <span id="highScore">0</span></h3>
<h3>世界ランキング</h3>
<div id="ranking"></div>
</div>

<div id="gameOver">
<h2>GAME OVER</h2>
<input id="playerName" placeholder="名前">
<br>
<button onclick="sendScore()">スコア送信</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"あなたのAPIキー",
  authDomain:"あなたのID.firebaseapp.com",
  projectId:"あなたのID"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const {Engine,Render,Runner,Bodies,World,Events,Body}=Matter;

const isMobile=window.innerWidth<768;
const width=isMobile?window.innerWidth:420;
const height=600;

const engine=Engine.create();
const world=engine.world;

const render=Render.create({
  element:document.body,
  engine:engine,
  options:{width:width,height:height,wireframes:false,background:"transparent"}
});

Render.run(render);
Runner.run(Runner.create(),engine);

/* ===== 容器中央 ===== */

const containerWidth=isMobile?width-40:380;
const containerHeight=540;

const ground=Bodies.rectangle(width/2,containerHeight+10,containerWidth,20,{isStatic:true});
const leftWall=Bodies.rectangle((width-containerWidth)/2,containerHeight/2,20,containerHeight,{isStatic:true});
const rightWall=Bodies.rectangle((width+containerWidth)/2,containerHeight/2,20,containerHeight,{isStatic:true});

World.add(world,[ground,leftWall,rightWall]);

/* ===== ボール ===== */

const ballImages=[
"images/inugame_size1.png",
"images/inugame_size2.png",
"images/inugame_size3.png",
"images/inugame_size4.png",
"images/inugame_size5.png",
"images/inugame_size6.png",
"images/inugame_size7.png",
"images/inugame_size8.png",
"images/inugame_size9.png"
];

/* さらに小さく */
const ballSizes=[12,16,22,28,36,46,58,72,88];

let score=0;
let highScore=Number(localStorage.getItem("highScore")||0);
document.getElementById("highScore").innerText=highScore;

let currentBall=null;
let nextIndex=Math.floor(Math.random()*3);
let isGameOver=false;

function createBall(index,x,y,isStatic=true){
  const radius=ballSizes[index];
  const ball=Bodies.circle(x,y,radius,{
    isStatic:isStatic,
    restitution:0.3,
    render:{
      sprite:{
        texture:ballImages[index],
        xScale:(radius*2)/200,
        yScale:(radius*2)/200
      }
    }
  });
  ball.sizeIndex=index;
  return ball;
}

function spawnBall(){
  if(isGameOver) return;
  currentBall=createBall(nextIndex,width/2,40,true);
  World.add(world,currentBall);
  nextIndex=Math.floor(Math.random()*3);
}

spawnBall();

/* ===== 操作 ===== */

function moveBall(x){
  if(!currentBall) return;
  const r=currentBall.circleRadius;
  const min=(width-containerWidth)/2+r;
  const max=(width+containerWidth)/2-r;
  x=Math.max(min,Math.min(max,x));
  Body.setPosition(currentBall,{x:x,y:40});
}

function dropBall(){
  if(!currentBall) return;
  Body.setStatic(currentBall,false);
  currentBall=null;
  setTimeout(spawnBall,400);
}

document.addEventListener("mousemove",e=>{if(!isMobile) moveBall(e.offsetX);});
document.addEventListener("click",()=>{if(!isMobile) dropBall();});
document.addEventListener("touchmove",e=>{if(isMobile) moveBall(e.touches[0].clientX);});
document.addEventListener("touchend",()=>{if(isMobile) dropBall();});

/* ===== 合体 ===== */

Events.on(engine,"collisionStart",event=>{
  event.pairs.forEach(pair=>{
    const a=pair.bodyA;
    const b=pair.bodyB;

    if(a.sizeIndex!==undefined && b.sizeIndex!==undefined){
      if(a.sizeIndex===b.sizeIndex && a.sizeIndex<8){

        const newIndex=a.sizeIndex+1;

        World.remove(world,a);
        World.remove(world,b);

        const newBall=createBall(newIndex,a.position.x,a.position.y,false);
        World.add(world,newBall);

        score+=(newIndex+1)*10;
        document.getElementById("score").innerText=score;

        if(score>highScore){
          highScore=score;
          localStorage.setItem("highScore",highScore);
          document.getElementById("highScore").innerText=highScore;
        }
      }
    }
  });
});

/* ===== ゲームオーバー ===== */

Events.on(engine,"afterUpdate",()=>{
  if(isGameOver) return;

  world.bodies.forEach(body=>{
    if(body.sizeIndex!==undefined && body.position.y<60){
      isGameOver=true;
      document.getElementById("gameOver").style.display="block";
    }
  });
});

/* ===== ランキング ===== */

async function sendScore(){
  const name=document.getElementById("playerName").value;
  if(!name) return alert("名前を入力してね");

  await addDoc(collection(db,"ranking"),{
    name:name,
    score:score,
    date:Date.now()
  });

  await loadRanking();

  location.reload(); // 自動リトライ
}

async function loadRanking(){
  const q=query(collection(db,"ranking"),orderBy("score","desc"),limit(5));
  const snapshot=await getDocs(q);

  const rankingDiv=document.getElementById("ranking");
  rankingDiv.innerHTML="";

  let rank=1;
  snapshot.forEach(doc=>{
    const data=doc.data();
    rankingDiv.innerHTML+=rank+"位 "+data.name+" : "+data.score+"<br>";
    rank++;
  });
}

loadRanking();

</script>
</body>
</html>
