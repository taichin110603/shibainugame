<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shiba Inu Game</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
body{
  margin:0;
  overflow:hidden;
  background:linear-gradient(to bottom,#fff7f0,#ffe8d9);
  font-family:sans-serif;
}
#ui{
  position:absolute;
  top:20px;
  right:30px;
  font-size:20px;
}
#score{margin-bottom:10px;}
canvas{display:block;}
</style>
</head>
<body>

<div id="ui">
  <div id="score">Score: 0</div>
</div>

<script>
const {Engine,Render,Runner,World,Bodies,Body,Events} = Matter;

const engine = Engine.create();
const world = engine.world;

const render = Render.create({
  element: document.body,
  engine: engine,
  options:{
    width:400,
    height:600,
    wireframes:false,
    background:"transparent"
  }
});

Render.run(render);
Runner.run(Runner.create(),engine);

/* ===========================
   サイズ（超小サイズ 1/4）
=========================== */

const sizes = [
  12,16,20,24,28,32,36,40,44  // ← 超小サイズ
];

const images = [
"images/inugame_size1.png",
"images/inugame_size2.png",
"images/inugame_size3.png",
"images/inugame_size4.png",
"images/inugame_size5.png",
"images/inugame_size6.png",
"images/inugame_size7.png",
"images/inugame_size8.png",
"images/inugame_size9.png"
];

let score = 0;

/* ===========================
   容器（下にずらす）
=========================== */

const wallThickness = 40;
const containerBottomY = 580;  // 下に配置

const leftWall = Bodies.rectangle(80,400,wallThickness,350,{isStatic:true,render:{fillStyle:"#d8cfc4"}});
const rightWall = Bodies.rectangle(320,400,wallThickness,350,{isStatic:true,render:{fillStyle:"#d8cfc4"}});
const ground = Bodies.rectangle(200,containerBottomY,280,wallThickness,{isStatic:true,render:{fillStyle:"#cbbeb0"}});

World.add(world,[leftWall,rightWall,ground]);

/* ===========================
   ボール生成
=========================== */

let currentBall = null;

function createBall(sizeIndex,x=200){
  const radius = sizes[sizeIndex];

  const ball = Bodies.circle(x,50,radius,{
    restitution:0.2,
    friction:0.1,
    render:{
      sprite:{
        texture:images[sizeIndex],
        xScale:(radius*2)/200,
        yScale:(radius*2)/200
      }
    }
  });

  ball.sizeIndex = sizeIndex;
  World.add(world,ball);
  return ball;
}

function spawnBall(){
  const randomIndex = Math.floor(Math.random()*3);
  currentBall = createBall(randomIndex);
}

spawnBall();

/* ===========================
   操作
=========================== */

document.addEventListener("mousemove",e=>{
  if(currentBall){
    Body.setPosition(currentBall,{x:e.clientX,y:50});
  }
});

document.addEventListener("click",()=>{
  if(currentBall){
    currentBall = null;
    setTimeout(spawnBall,500);
  }
});

/* ===========================
   合体処理
=========================== */

Events.on(engine,"collisionStart",event=>{
  event.pairs.forEach(pair=>{
    const a = pair.bodyA;
    const b = pair.bodyB;

    if(a.sizeIndex !== undefined && b.sizeIndex !== undefined && a !== currentBall && b !== currentBall){

      if(a.sizeIndex === b.sizeIndex && a.sizeIndex < sizes.length-1){

        const newIndex = a.sizeIndex + 1;
        const newX = (a.position.x + b.position.x)/2;
        const newY = (a.position.y + b.position.y)/2;

        World.remove(world,a);
        World.remove(world,b);

        createBall(newIndex,newX);

        score += (newIndex+1)*10;
        document.getElementById("score").innerText="Score: "+score;
      }
    }
  });
});
</script>
</body>
</html>
