<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>犬スイカゲーム 🐶</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/poly-decomp/0.3.0/poly-decomp.min.js"></script>
<script> Matter.Common.setDecomp(window.decomp); </script>

<style>
body,html{
margin:0;
overflow:hidden;
width:100%;
height:100%;
background:linear-gradient(#ffb347,#ffcc70);
font-family:sans-serif;
touch-action:none;
}

#containerVisual{
position:absolute;
left:50%;
transform:translateX(-50%);
border-left:8px solid #8b4513;
border-right:8px solid #8b4513;
border-bottom:8px solid #8b4513;
border-bottom-left-radius:50px;
border-bottom-right-radius:50px;
pointer-events:none;
z-index:1;
background:rgba(255,200,150,0.2);
}

#scoreBox{
position:absolute;
top:20px;
right:20px;
font-size:20px;
z-index:10;
}

#gameOver{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
background:white;
padding:20px;
border-radius:10px;
z-index:20;
}
canvas{ position:absolute; top:0; left:0; }
</style>
</head>
<body>

<div id="containerVisual"></div>

<div id="scoreBox">
Score : <span id="score">0</span><br>
High : <span id="highScore">0</span>
</div>

<div id="gameOver">
<h1 style="color:red;">GAME OVER</h1>
<button onclick="location.reload()">Retry</button>
</div>

<script>
const {Engine,Render,Runner,World,Bodies,Body,Events}=Matter;

const width=window.innerWidth;
const height=window.innerHeight;
const isMobile=width<768;

const engine=Engine.create();
engine.world.gravity.y=1;
const world=engine.world;

const render=Render.create({
element:document.body,
engine,
options:{width,height,wireframes:false,background:"transparent"}
});
Render.run(render);
Runner.run(Runner.create(),engine);

const containerWidth=isMobile?width*0.9:420;
const containerHeight=isMobile?height*0.6:520;

const centerX=width/2;
const topY=height*0.15;
const bottomY=topY+containerHeight;

const visual=document.getElementById("containerVisual");
visual.style.width=containerWidth+"px";
visual.style.height=containerHeight+"px";
visual.style.top=topY+"px";

World.add(world,[
Bodies.rectangle(centerX-containerWidth/2,bottomY-containerHeight/2,40,containerHeight,{isStatic:true}),
Bodies.rectangle(centerX+containerWidth/2,bottomY-containerHeight/2,40,containerHeight,{isStatic:true}),
Bodies.rectangle(centerX,bottomY+20,containerWidth,60,{isStatic:true})
]);

const sizes=[18,26,36,48,62,78,100,125,160,200,240];

let currentBall=null;
let score=0;
let highScore=localStorage.getItem("highScore")||0;
let isGameOver=false;

document.getElementById("highScore").innerText=highScore;

function createBall(sizeIndex,x,y,isStatic=false){
const radius=sizes[sizeIndex];
const ball=Bodies.circle(x,y,radius,{
restitution:0.2,
friction:0.3,
isStatic,
render:{fillStyle:"#ff9966"}
});
ball.sizeIndex=sizeIndex;
return ball;
}

function spawnBall(){
if(isGameOver) return;
const sizeIndex=Math.floor(Math.random()*3);
currentBall=createBall(sizeIndex,centerX,topY,true);
World.add(world,currentBall);
}
spawnBall();

/* ===== 容器制限 ===== */
function moveBall(x){
if(!currentBall || isGameOver) return;

const min=centerX-containerWidth/2+currentBall.circleRadius;
const max=centerX+containerWidth/2-currentBall.circleRadius;
const fixed=Math.max(min,Math.min(max,x));

Body.setPosition(currentBall,{x:fixed,y:topY});
}

window.addEventListener("mousemove",e=>moveBall(e.clientX));
window.addEventListener("touchmove",e=>{
moveBall(e.touches[0].clientX);
},{passive:false});

function dropBall(){
if(!currentBall || isGameOver) return;
Body.setStatic(currentBall,false);
currentBall=null;
setTimeout(spawnBall,400);
}

window.addEventListener("click",dropBall);
window.addEventListener("touchstart",dropBall,{passive:false});

/* ===== 合体修正版 ===== */
Events.on(engine,"collisionStart",event=>{
event.pairs.forEach(pair=>{
const a=pair.bodyA;
const b=pair.bodyB;

if(a.sizeIndex===undefined) return;
if(b.sizeIndex===undefined) return;
if(a.sizeIndex!==b.sizeIndex) return;
if(a.merged||b.merged) return;

a.merged=true;
b.merged=true;

const newSize=a.sizeIndex+1;
if(newSize>=sizes.length) return;

const newBall=createBall(newSize,
(a.position.x+b.position.x)/2,
(a.position.y+b.position.y)/2);

World.remove(world,a);
World.remove(world,b);
World.add(world,newBall);

score+=(newSize+1)*10;
document.getElementById("score").innerText=score;

if(score>highScore){
highScore=score;
localStorage.setItem("highScore",highScore);
document.getElementById("highScore").innerText=highScore;
}
});
});

/* ===== 正しいゲームオーバー判定 ===== */
Events.on(engine,"afterUpdate",()=>{
if(isGameOver) return;

for(let body of world.bodies){
if(body.sizeIndex!==undefined){
if(body.position.y - body.circleRadius <= topY){
isGameOver=true;
document.getElementById("gameOver").style.display="block";
break;
}
}
}
});
</script>

</body>
</html>
