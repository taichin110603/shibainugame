<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shiba Merge Game</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:linear-gradient(#fff4e6,#ffe0cc);
}

#ui{
  position:absolute;
  top:15px;
  right:20px;
  text-align:right;
  font-size:18px;
}

#ranking{
  position:absolute;
  left:20px;
  top:15px;
  width:200px;
  font-size:14px;
}

#gameOverPanel{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:15px;
  display:none;
  text-align:center;
}

input{
  padding:5px;
  margin-top:10px;
}
button{
  padding:6px 10px;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="ui">
  <div>Score: <span id="score">0</span></div>
</div>

<div id="ranking">
  <b>🌎 World Ranking</b>
  <div id="rankList"></div>
</div>

<div id="gameOverPanel">
  <h2>GAME OVER</h2>
  <div>名前を入力してランキング登録</div>
  <input id="playerName" placeholder="名前">
  <br>
  <button onclick="sendScore()">送信してリトライ</button>
</div>

<script>
const {Engine,Render,Runner,World,Bodies,Events,Body} = Matter;

const engine = Engine.create();
const world = engine.world;

const render = Render.create({
  element: document.body,
  engine: engine,
  options:{
    width: window.innerWidth,
    height: window.innerHeight,
    wireframes:false,
    background:"transparent"
  }
});

Render.run(render);
Runner.run(Runner.create(),engine);

let score = 0;
let currentBall = null;
let gameOver = false;

const scoreEl = document.getElementById("score");
const panel = document.getElementById("gameOverPanel");

const isMobile = window.innerWidth < 768;

/* ===== 容器サイズ（スマホ大きめ） ===== */
const cupWidth = isMobile ? 320 : 240;
const cupHeight = isMobile ? 420 : 350;

const cupX = window.innerWidth/2;
const cupY = window.innerHeight*0.65;

/* ===== 壁 ===== */
const walls = [
  Bodies.rectangle(cupX - cupWidth/2, cupY, 20, cupHeight, {isStatic:true,render:{fillStyle:"#d2a679"}}),
  Bodies.rectangle(cupX + cupWidth/2, cupY, 20, cupHeight, {isStatic:true,render:{fillStyle:"#d2a679"}}),
  Bodies.rectangle(cupX, cupY + cupHeight/2, cupWidth, 20, {isStatic:true,render:{fillStyle:"#c68c53"}})
];
World.add(world,walls);

/* ===== ボールサイズ（かなり小さく） ===== */
const baseSize = isMobile ? 18 : 14;

const sizes = Array.from({length:11},(_,i)=>baseSize + i*4);

const colors = [
  "#ffcc99","#ffb366","#ff9933","#ff8000","#ff6600",
  "#ff4d00","#ff3300","#ff1a00","#e62e00","#cc2900","#b32400"
];

/* ===== ボール生成 ===== */
function spawnBall(){
  if(gameOver) return;

  const x = window.innerWidth/2;
  currentBall = Bodies.circle(x,100,sizes[0],{
    restitution:0.2,
    render:{fillStyle:colors[0]}
  });
  currentBall.sizeIndex = 0;
  World.add(world,currentBall);
}

spawnBall();

/* ===== 落下処理 ===== */
function dropBall(){
  currentBall = null;
  setTimeout(spawnBall,500);
}

document.addEventListener("click",()=>{
  if(currentBall && !isMobile) dropBall();
});

document.addEventListener("touchend",()=>{
  if(currentBall && isMobile) dropBall();
});

/* ===== 合体 ===== */
Events.on(engine,"collisionStart",e=>{
  e.pairs.forEach(pair=>{
    const a = pair.bodyA;
    const b = pair.bodyB;
    if(a.sizeIndex!==undefined && b.sizeIndex!==undefined && a!==currentBall && b!==currentBall){
      if(a.sizeIndex === b.sizeIndex){
        if(a.sizeIndex >= sizes.length-1) return;

        World.remove(world,[a,b]);

        const newIndex = a.sizeIndex+1;
        const newBall = Bodies.circle(a.position.x,a.position.y,sizes[newIndex],{
          restitution:0.2,
          render:{fillStyle:colors[newIndex]}
        });
        newBall.sizeIndex = newIndex;
        World.add(world,newBall);

        score += (newIndex+1)*10;
        scoreEl.textContent = score;
      }
    }
  });
});

/* ===== ゲームオーバー判定 ===== */
Events.on(engine,"afterUpdate",()=>{
  world.bodies.forEach(body=>{
    if(body.position.y < cupY - cupHeight/2 - 30 && body.sizeIndex!==undefined){
      endGame();
    }
  });
});

function endGame(){
  if(gameOver) return;
  gameOver = true;
  panel.style.display="block";
}

/* ===== ランキング ===== */
function sendScore(){
  const name = document.getElementById("playerName").value || "名無し";

  let ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
  ranking.push({name,score});
  ranking.sort((a,b)=>b.score-a.score);
  ranking = ranking.slice(0,10);

  localStorage.setItem("ranking",JSON.stringify(ranking));

  updateRanking();

  restartGame();
}

function updateRanking(){
  const ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
  const list = document.getElementById("rankList");
  list.innerHTML="";
  ranking.forEach((r,i)=>{
    list.innerHTML += `<div>${i+1}. ${r.name} - ${r.score}</div>`;
  });
}

updateRanking();

/* ===== リスタート ===== */
function restartGame(){
  location.reload();
}
</script>
</body>
</html>
