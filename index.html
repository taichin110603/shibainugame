<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inu Merge Game</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:linear-gradient(#fff4ec,#ffe6d5);
}
#ui{
  position:absolute;
  top:20px;
  right:20px;
  font-size:20px;
  color:#6b3e26;
}
#ranking{
  position:absolute;
  top:20px;
  left:20px;
  width:200px;
  font-size:14px;
  color:#6b3e26;
}
#gameOverPanel{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:15px;
  display:none;
  text-align:center;
}
input{padding:6px;margin-top:10px;}
button{padding:6px 12px;margin-top:10px;cursor:pointer;}
</style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>

<div id="ranking">
<b>🌎 World Ranking</b>
<div id="rankList"></div>
</div>

<div id="gameOverPanel">
<h2>GAME OVER</h2>
<p>名前を入力</p>
<input id="playerName" placeholder="名前">
<br>
<button onclick="sendScore()">送信してリトライ</button>
</div>

<script>
const {Engine,Render,Runner,World,Bodies,Events} = Matter;

const engine = Engine.create();
const world = engine.world;

const width = window.innerWidth;
const height = window.innerHeight;

const render = Render.create({
  element:document.body,
  engine:engine,
  options:{
    width:width,
    height:height,
    wireframes:false,
    background:"#fff4ec"
  }
});

Render.run(render);
Runner.run(Runner.create(),engine);

let score = 0;
let currentBall = null;
let gameOver = false;
let overTimer = 0;

const scoreEl = document.getElementById("score");
const panel = document.getElementById("gameOverPanel");

const isMobile = width < 768;

/* ===== 容器 ===== */
const cupWidth = isMobile ? 380 : 320;
const cupHeight = isMobile ? 520 : 480;

const cupX = width/2;
const cupY = height*0.72;

World.add(world,[
  Bodies.rectangle(cupX - cupWidth/2, cupY, 30, cupHeight,{isStatic:true,render:{fillStyle:"#c89f7b"}}),
  Bodies.rectangle(cupX + cupWidth/2, cupY, 30, cupHeight,{isStatic:true,render:{fillStyle:"#c89f7b"}}),
  Bodies.rectangle(cupX, cupY + cupHeight/2, cupWidth, 30,{isStatic:true,render:{fillStyle:"#a47148"}})
]);

/* ===== 画像 ===== */
const images = [
"images/inugame_size1.png",
"images/inugame_size2.png",
"images/inugame_size3.png",
"images/inugame_size4.png",
"images/inugame_size5.png",
"images/inugame_size6.png",
"images/inugame_size7.png",
"images/inugame_size8.png",
"images/inugame_size9.png"
];

/* 🔥🔥 超極小サイズ設定（ここだけ変更）🔥🔥 */
const baseSize = 3;   // ← 半径3px
const sizes = Array.from({length:9},(_,i)=>baseSize + i*2);

function createBall(x,y,index){
  const ball = Bodies.circle(x,y,sizes[index],{
    restitution:0.2,
    render:{
      sprite:{
        texture:images[index],
        xScale:(sizes[index]*2)/300,
        yScale:(sizes[index]*2)/300
      }
    }
  });
  ball.sizeIndex = index;
  return ball;
}

/* ===== スポーン ===== */
function spawnBall(){
  if(gameOver) return;
  currentBall = createBall(width/2,120,0);
  World.add(world,currentBall);
}
spawnBall();

/* ===== 落下 ===== */
function dropBall(){
  currentBall = null;
  setTimeout(spawnBall,250);
}
document.addEventListener("click",()=>{ if(currentBall) dropBall(); });
document.addEventListener("touchend",()=>{ if(currentBall) dropBall(); });

/* ===== 合体 ===== */
Events.on(engine,"collisionStart",event=>{
  event.pairs.forEach(pair=>{
    const a = pair.bodyA;
    const b = pair.bodyB;

    if(a.sizeIndex!==undefined &&
       b.sizeIndex!==undefined &&
       a!==currentBall &&
       b!==currentBall &&
       a.sizeIndex===b.sizeIndex &&
       a.sizeIndex < sizes.length-1){

        World.remove(world,[a,b]);

        const newBall = createBall(
          a.position.x,
          a.position.y,
          a.sizeIndex+1
        );
        World.add(world,newBall);

        score += (a.sizeIndex+1)*10;
        scoreEl.textContent = score;
    }
  });
});

/* ===== ゲームオーバー ===== */
Events.on(engine,"afterUpdate",()=>{
  if(gameOver) return;

  let overflow = false;

  world.bodies.forEach(body=>{
    if(body.sizeIndex!==undefined){
      if(body.position.y < cupY - cupHeight/2 - 40){
        overflow = true;
      }
    }
  });

  if(overflow){
    overTimer++;
    if(overTimer > 120){
      endGame();
    }
  }else{
    overTimer = 0;
  }
});

function endGame(){
  gameOver = true;
  panel.style.display="block";
}

/* ===== ランキング ===== */
function sendScore(){
  const name = document.getElementById("playerName").value || "名無し";

  let ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
  ranking.push({name,score});
  ranking.sort((a,b)=>b.score-a.score);
  ranking = ranking.slice(0,10);
  localStorage.setItem("ranking",JSON.stringify(ranking));
  updateRanking();

  restartGame();
}

function updateRanking(){
  const ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
  const list = document.getElementById("rankList");
  list.innerHTML="";
  ranking.forEach((r,i)=>{
    list.innerHTML += `<div>${i+1}. ${r.name} - ${r.score}</div>`;
  });
}
updateRanking();

/* ===== リセット ===== */
function restartGame(){
  panel.style.display="none";
  score = 0;
  scoreEl.textContent = 0;
  gameOver = false;
  overTimer = 0;

  world.bodies.slice().forEach(b=>{
    if(!b.isStatic) World.remove(world,b);
  });

  spawnBall();
}
</script>
</body>
</html>
