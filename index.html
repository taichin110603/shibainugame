<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shiba Merge Game</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:linear-gradient(#fff3e0,#ffd9b3);
}

#ui{
  position:absolute;
  top:20px;
  right:20px;
  font-size:20px;
}

#ranking{
  position:absolute;
  top:20px;
  left:20px;
  width:220px;
  font-size:14px;
}

#gameOverPanel{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:15px;
  display:none;
  text-align:center;
}

input{
  padding:6px;
  margin-top:10px;
}

button{
  padding:6px 12px;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>

<div id="ranking">
<b>🌎 World Ranking</b>
<div id="rankList"></div>
</div>

<div id="gameOverPanel">
<h2>GAME OVER</h2>
<p>名前を入力してください</p>
<input id="playerName" placeholder="名前">
<br>
<button onclick="sendScore()">送信してもう一度遊ぶ</button>
</div>

<script>
const {Engine,Render,Runner,World,Bodies,Events,Body} = Matter;

const engine = Engine.create();
const world = engine.world;

const render = Render.create({
  element: document.body,
  engine: engine,
  options:{
    width: window.innerWidth,
    height: window.innerHeight,
    wireframes:false,
    background:"transparent"
  }
});

Render.run(render);
Runner.run(Runner.create(),engine);

let score = 0;
let currentBall = null;
let gameOver = false;

const scoreEl = document.getElementById("score");
const panel = document.getElementById("gameOverPanel");

const isMobile = window.innerWidth < 768;

/* ===== 容器（さらに大きく） ===== */
const cupWidth = isMobile ? 380 : 300;
const cupHeight = isMobile ? 520 : 450;

const cupX = window.innerWidth/2;
const cupY = window.innerHeight*0.7;

const walls = [
  Bodies.rectangle(cupX - cupWidth/2, cupY, 30, cupHeight, {isStatic:true,render:{fillStyle:"#cc9966"}}),
  Bodies.rectangle(cupX + cupWidth/2, cupY, 30, cupHeight, {isStatic:true,render:{fillStyle:"#cc9966"}}),
  Bodies.rectangle(cupX, cupY + cupHeight/2, cupWidth, 30, {isStatic:true,render:{fillStyle:"#b37700"}})
];

World.add(world,walls);

/* ===== サイズ ===== */
const baseSize = isMobile ? 22 : 18;
const sizes = Array.from({length:11},(_,i)=>baseSize + i*5);

/* ===== 画像ボール生成 ===== */
function createBall(x,y,index){
  const ball = Bodies.circle(x,y,sizes[index],{
    restitution:0.2,
    render:{
      sprite:{
        texture:`images/ball${index}.png`,
        xScale:(sizes[index]*2)/100,
        yScale:(sizes[index]*2)/100
      }
    }
  });
  ball.sizeIndex = index;
  return ball;
}

/* ===== スポーン ===== */
function spawnBall(){
  if(gameOver) return;
  const x = window.innerWidth/2;
  currentBall = createBall(x,100,0);
  World.add(world,currentBall);
}

spawnBall();

/* ===== 落下 ===== */
function dropBall(){
  currentBall = null;
  setTimeout(spawnBall,500);
}

document.addEventListener("click",()=>{
  if(currentBall && !isMobile) dropBall();
});

document.addEventListener("touchend",()=>{
  if(currentBall && isMobile) dropBall();
});

/* ===== 合体 ===== */
Events.on(engine,"collisionStart",e=>{
  e.pairs.forEach(pair=>{
    const a = pair.bodyA;
    const b = pair.bodyB;

    if(a.sizeIndex!==undefined && b.sizeIndex!==undefined &&
       a!==currentBall && b!==currentBall){

      if(a.sizeIndex === b.sizeIndex){
        if(a.sizeIndex >= sizes.length-1) return;

        World.remove(world,[a,b]);

        const newIndex = a.sizeIndex+1;
        const newBall = createBall(a.position.x,a.position.y,newIndex);
        World.add(world,newBall);

        score += (newIndex+1)*10;
        scoreEl.textContent = score;
      }
    }
  });
});

/* ===== ゲームオーバー（こぼれた時のみ） ===== */
Events.on(engine,"afterUpdate",()=>{
  if(gameOver) return;

  world.bodies.forEach(body=>{
    if(body.sizeIndex!==undefined){
      if(body.position.y < cupY - cupHeight/2 - 50){
        endGame();
      }
    }
  });
});

function endGame(){
  gameOver = true;
  panel.style.display="block";
}

/* ===== ランキング ===== */
function sendScore(){
  const name = document.getElementById("playerName").value || "名無し";

  let ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
  ranking.push({name,score});
  ranking.sort((a,b)=>b.score-a.score);
  ranking = ranking.slice(0,10);

  localStorage.setItem("ranking",JSON.stringify(ranking));
  updateRanking();

  restartGame();
}

function updateRanking(){
  const ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
  const list = document.getElementById("rankList");
  list.innerHTML="";
  ranking.forEach((r,i)=>{
    list.innerHTML += `<div>${i+1}. ${r.name} - ${r.score}</div>`;
  });
}

updateRanking();

/* ===== 即リスタート（reloadなし） ===== */
function restartGame(){
  panel.style.display="none";
  score = 0;
  scoreEl.textContent = 0;
  gameOver = false;

  world.bodies.slice().forEach(b=>{
    if(!b.isStatic) World.remove(world,b);
  });

  spawnBall();
}
</script>
</body>
</html>
