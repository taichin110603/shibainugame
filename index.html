<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inu Merge Game</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:linear-gradient(#fff4ec,#ffe6d5);
}
#ui{
  position:absolute;
  top:20px;
  right:20px;
  font-size:20px;
  color:#6b3e26;
}
#ranking{
  position:absolute;
  top:20px;
  left:20px;
  width:200px;
  font-size:14px;
  color:#6b3e26;
}
#gameOverPanel{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:15px;
  display:none;
  text-align:center;
}
input{padding:6px;margin-top:10px;}
button{padding:6px 12px;margin-top:10px;cursor:pointer;}
</style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>

<div id="ranking">
<b>🌎 World Ranking</b>
<div id="rankList"></div>
</div>

<div id="gameOverPanel">
<h2>GAME OVER</h2>
<p>名前を入力</p>
<input id="playerName" placeholder="名前">
<br>
<button onclick="sendScore()">送信してリトライ</button>
</div>

<script>

const {Engine,Render,Runner,World,Bodies,Events,Body} = Matter;

const engine = Engine.create();
engine.world.gravity.y = 0.6;

const world = engine.world;

const width = window.innerWidth;
const height = window.innerHeight;

const render = Render.create({
  element:document.body,
  engine:engine,
  options:{
    width:width,
    height:height,
    wireframes:false,
    background:"#fff4ec"
  }
});

Render.run(render);
Runner.run(Runner.create(),engine);

let score = 0;
let currentBall = null;
let gameOver = false;

const scoreEl = document.getElementById("score");
const panel = document.getElementById("gameOverPanel");

const isMobile = width < 768;

/* ===== 容器 ===== */

const cupWidth = isMobile ? 380 : 320;
const cupHeight = isMobile ? 520 : 480;

const cupX = width/2;
const cupY = height*0.72;

const leftWallX = cupX - cupWidth/2;
const rightWallX = cupX + cupWidth/2;

World.add(world,[

Bodies.rectangle(leftWallX,cupY,30,cupHeight,{isStatic:true}),
Bodies.rectangle(rightWallX,cupY,30,cupHeight,{isStatic:true}),
Bodies.rectangle(cupX,cupY+cupHeight/2,cupWidth,30,{isStatic:true})

]);

/* ===== 画像 ===== */

const images = [

"images/inugame_size1.png",
"images/inugame_size2.png",
"images/inugame_size3.png",
"images/inugame_size4.png",
"images/inugame_size5.png",
"images/inugame_size6.png",
"images/inugame_size7.png",
"images/inugame_size8.png",
"images/inugame_size9.png"

];

/* ===== サイズ ===== */

const baseSize = 3;
const sizes = Array.from({length:9},(_,i)=>baseSize + i*2);

/* ===== ボール作成 ===== */

function createBall(x,y,index){

const ball = Bodies.circle(x,y,sizes[index],{

isStatic:true,
restitution:0.1,
friction:0.3,
frictionAir:0.02,

render:{
sprite:{
texture:images[index],
xScale:(sizes[index]*2)/300,
yScale:(sizes[index]*2)/300
}
}

});

ball.sizeIndex = index;

return ball;

}

/* ===== スポーン ===== */

function spawnBall(){

if(gameOver) return;

currentBall = createBall(width/2,120,0);

World.add(world,currentBall);

}

spawnBall();

/* ===== マウス移動 ===== */

document.addEventListener("mousemove",(e)=>{

if(!currentBall || gameOver) return;

let x = e.clientX;

if(x < leftWallX+10) x = leftWallX+10;
if(x > rightWallX-10) x = rightWallX-10;

Body.setPosition(currentBall,{x:x,y:120});

});

/* ===== スマホ移動 ===== */

document.addEventListener("touchmove",(e)=>{

if(!currentBall || gameOver) return;

let x = e.touches[0].clientX;

if(x < leftWallX+10) x = leftWallX+10;
if(x > rightWallX-10) x = rightWallX-10;

Body.setPosition(currentBall,{x:x,y:120});

});

/* ===== 落とす ===== */

function dropBall(x){

if(!currentBall) return;

if(x < leftWallX || x > rightWallX) return;

Body.setStatic(currentBall,false);

currentBall = null;

setTimeout(spawnBall,500);

}

document.addEventListener("click",(e)=>{

dropBall(e.clientX);

});

document.addEventListener("touchend",(e)=>{

const x = e.changedTouches[0].clientX;

dropBall(x);

});

/* ===== 合体 ===== */

Events.on(engine,"collisionStart",event=>{

event.pairs.forEach(pair=>{

const a = pair.bodyA;
const b = pair.bodyB;

if(

a.sizeIndex!==undefined &&
b.sizeIndex!==undefined &&
a!==currentBall &&
b!==currentBall &&
a.sizeIndex===b.sizeIndex &&
a.sizeIndex < sizes.length-1

){

World.remove(world,[a,b]);

const newBall = createBall(

a.position.x,
a.position.y,
a.sizeIndex+1

);

Body.setStatic(newBall,false);

World.add(world,newBall);

score += (a.sizeIndex+1)*10;

scoreEl.textContent = score;

}

});

});

/* ===== 画面外ゲームオーバー ===== */

Events.on(engine,"afterUpdate",()=>{

if(gameOver) return;

world.bodies.forEach(body=>{

if(body.sizeIndex!==undefined && !body.isStatic){  

if(body.position.y > height + 50){
endGame();
}

}

});

});

/* ===== 終了 ===== */

function endGame(){

if(gameOver) return;

gameOver=true;

panel.style.display="block";

}

/* ===== ランキング ===== */

function sendScore(){

const name = document.getElementById("playerName").value || "名無し";

let ranking = JSON.parse(localStorage.getItem("ranking")||"[]");

ranking.push({name,score});

ranking.sort((a,b)=>b.score-a.score);

ranking = ranking.slice(0,10);

localStorage.setItem("ranking",JSON.stringify(ranking));

updateRanking();

restartGame();

}

function updateRanking(){

const ranking = JSON.parse(localStorage.getItem("ranking")||"[]");

const list = document.getElementById("rankList");

list.innerHTML="";

ranking.forEach((r,i)=>{

list.innerHTML += `<div>${i+1}. ${r.name} - ${r.score}</div>`;

});

}

updateRanking();

/* ===== リスタート ===== */

function restartGame(){

panel.style.display="none";

score=0;
scoreEl.textContent=0;

gameOver=false;

world.bodies.slice().forEach(b=>{

if(!b.isStatic) World.remove(world,b);

});

spawnBall();

}

</script>
</body>
</html>
