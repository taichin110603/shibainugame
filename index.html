<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shiba Inu Game</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
body{
margin:0;
background:#f4f4f4;
font-family:sans-serif;
text-align:center;
}

#ui{
position:absolute;
top:20px;
right:20px;
font-size:22px;
}

#gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:red;
display:none;
}
</style>
</head>

<body>

<div id="ui">
Score : <span id="score">0</span><br>
Best : <span id="best">0</span>
</div>

<div id="gameover">GAME OVER</div>

<script>

const Engine = Matter.Engine;
const Render = Matter.Render;
const World = Matter.World;
const Bodies = Matter.Bodies;
const Events = Matter.Events;

const engine = Engine.create();
const world = engine.world;

const width = 400;
const height = 600;

/* 描画 */

const render = Render.create({
element:document.body,
engine:engine,
options:{
width:width,
height:height,
wireframes:false,
background:"#ffffff"
}
});

Render.run(render);
Engine.run(engine);

/* スコア */

let score = 0;

let best = localStorage.getItem("bestScore") || 0;
document.getElementById("best").innerText = best;

function addScore(v){

score += v;
document.getElementById("score").innerText = score;

if(score > best){
best = score;
localStorage.setItem("bestScore",best);
document.getElementById("best").innerText = best;
}

}

/* 容器位置（かなり上に変更） */

const leftWall = Bodies.rectangle(80,350,20,350,{isStatic:true});
const rightWall = Bodies.rectangle(320,350,20,350,{isStatic:true});
const floor = Bodies.rectangle(200,500,260,20,{isStatic:true});

World.add(world,[leftWall,rightWall,floor]);

/* ボール */

const sizes = [
20,25,30,35,40,45,50,55,60,65,70
];

const images = [
"img/1.png",
"img/2.png",
"img/3.png",
"img/4.png",
"img/5.png",
"img/6.png",
"img/7.png",
"img/8.png",
"img/9.png",
"img/10.png",
"img/11.png"
];

let currentBall = null;
let canDrop = true;

/* ボール生成 */

function createBall(x,sizeIndex){

const r = sizes[sizeIndex];

const ball = Bodies.circle(x,60,r,{
restitution:0.2,
friction:0.1,
render:{
sprite:{
texture:images[sizeIndex],
xScale:(r*2)/256,
yScale:(r*2)/256
}
}
});

ball.sizeIndex = sizeIndex;

World.add(world,ball);

return ball;
}

/* クリックで落とす */

document.addEventListener("mousedown",e=>{

if(!canDrop) return;

canDrop = false;

const x = e.clientX;

currentBall = createBall(x,0);

setTimeout(()=>{
canDrop = true;
},400);

});

/* 合体 */

Events.on(engine,"collisionStart",event=>{

event.pairs.forEach(pair=>{

const a = pair.bodyA;
const b = pair.bodyB;

if(a.sizeIndex !== undefined && b.sizeIndex !== undefined){

if(a.sizeIndex === b.sizeIndex){

const newSize = a.sizeIndex + 1;

if(newSize >= sizes.length) return;

World.remove(world,a);
World.remove(world,b);

const newBall = createBall(
(a.position.x + b.position.x)/2,
newSize
);

newBall.position.y = (a.position.y + b.position.y)/2;

addScore((newSize+1)*10);

}

}

});

});

/* ゲームオーバー判定 */

Events.on(engine,"afterUpdate",()=>{

world.bodies.forEach(b=>{

if(b.sizeIndex !== undefined){

/* 画面外に落ちたらゲームオーバー */

if(b.position.y > height + 50){

document.getElementById("gameover").style.display="block";

Engine.clear(engine);

}

}

});

});

</script>

</body>
</html>
