<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shiba Inu Game</title>
<script src="matter.min.js"></script>
<style>
  body{
    margin:0;
    background:#f0f8ff;
    text-align:center;
    font-family:sans-serif;
  }
  #ui{
    position:absolute;
    right:30px;
    top:30px;
    font-size:20px;
    font-weight:bold;
  }
</style>
</head>
<body>

<div id="ui">
  SCORE: <span id="score">0</span>
</div>

<script>
const { Engine, Render, Runner, Bodies, World, Events } = Matter;

const engine = Engine.create();
const world = engine.world;

// ====== 画面 ======
const render = Render.create({
  element: document.body,
  engine: engine,
  options:{
    width:500,
    height:700,
    wireframes:false,
    background:"#f0f8ff"
  }
});

Render.run(render);
Runner.run(Runner.create(), engine);

// ====== 容器 ======
const wallThickness = 30;
const containerWidth = 300;
const containerHeight = 500;
const containerX = 250;
const containerY = 500;

// 床
const floor = Bodies.rectangle(
  containerX,
  containerY,
  containerWidth,
  wallThickness,
  {
    isStatic:true,
    render:{
      fillStyle:"rgba(180,220,255,0.6)",
      strokeStyle:"#88c",
      lineWidth:4
    }
  }
);

// 左壁
const leftWall = Bodies.rectangle(
  containerX - containerWidth/2,
  containerY - containerHeight/2,
  wallThickness,
  containerHeight,
  {
    isStatic:true,
    render:{
      fillStyle:"rgba(180,220,255,0.6)",
      strokeStyle:"#88c",
      lineWidth:4
    }
  }
);

// 右壁
const rightWall = Bodies.rectangle(
  containerX + containerWidth/2,
  containerY - containerHeight/2,
  wallThickness,
  containerHeight,
  {
    isStatic:true,
    render:{
      fillStyle:"rgba(180,220,255,0.6)",
      strokeStyle:"#88c",
      lineWidth:4
    }
  }
);

World.add(world, [floor, leftWall, rightWall]);

// ====== ボール ======
let score = 0;
let currentBall = null;

function createBall(x){
  return Bodies.circle(x, 100, 20, {
    restitution:0.4,
    render:{
      fillStyle:"#b5651d" // とりあえず茶色
    }
  });
}

function spawnBall(x){
  currentBall = createBall(x);
  World.add(world, currentBall);
}

spawnBall(250);

// ====== クリックで落とす ======
document.addEventListener("click", function(e){
  if(!currentBall) return;
  spawnBall(e.offsetX);
});

// ====== スコア（仮） ======
Events.on(engine,"collisionStart",function(event){
  score += 1;
  document.getElementById("score").innerText = score;
});
</script>

</body>
</html>
