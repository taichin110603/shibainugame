<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shiba Merge Game</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:linear-gradient(#ffcc99,#ff9966,#ff7f50);
}

#ui{
  position:absolute;
  top:20px;
  right:20px;
  font-size:22px;
  color:white;
}

#ranking{
  position:absolute;
  top:20px;
  left:20px;
  width:220px;
  font-size:14px;
  color:white;
}

#gameOverPanel{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:30px;
  border-radius:20px;
  display:none;
  text-align:center;
}
input{padding:8px;margin-top:10px;}
button{padding:8px 15px;margin-top:10px;cursor:pointer;}
</style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>

<div id="ranking">
<b>🌎 World Ranking</b>
<div id="rankList"></div>
</div>

<div id="gameOverPanel">
<h2>GAME OVER</h2>
<p>名前を入力してください</p>
<input id="playerName" placeholder="名前">
<br>
<button onclick="sendScore()">送信してリトライ</button>
</div>

<script>
const {Engine,Render,Runner,World,Bodies,Events,Body} = Matter;

const engine = Engine.create();
const world = engine.world;

const render = Render.create({
  element:document.body,
  engine:engine,
  options:{
    width:window.innerWidth,
    height:window.innerHeight,
    wireframes:false,
    background:"transparent"
  }
});
Render.run(render);
Runner.run(Runner.create(),engine);

let score = 0;
let currentBall = null;
let gameOver = false;
let overTimer = 0;

const scoreEl = document.getElementById("score");
const panel = document.getElementById("gameOverPanel");

const isMobile = window.innerWidth < 768;

/* ===== 容器さらに大きく ===== */
const cupWidth = isMobile ? 420 : 340;
const cupHeight = isMobile ? 600 : 500;

const cupX = window.innerWidth/2;
const cupY = window.innerHeight*0.72;

const walls = [
  Bodies.rectangle(cupX - cupWidth/2, cupY, 30, cupHeight, {isStatic:true,render:{fillStyle:"#8b5a2b"}}),
  Bodies.rectangle(cupX + cupWidth/2, cupY, 30, cupHeight, {isStatic:true,render:{fillStyle:"#8b5a2b"}}),
  Bodies.rectangle(cupX, cupY + cupHeight/2, cupWidth, 30, {isStatic:true,render:{fillStyle:"#5c3317"}})
];
World.add(world,walls);

/* ===== サイズ（適正） ===== */
const baseSize = isMobile ? 20 : 16;
const sizes = Array.from({length:11},(_,i)=>baseSize + i*5);

/* ===== 画像ボール（前と同じ方式） ===== */
function createBall(x,y,index){
  const ball = Bodies.circle(x,y,sizes[index],{
    restitution:0.2,
    render:{
      sprite:{
        texture:`images/ball${index}.png`,
        xScale:(sizes[index]*2)/100,
        yScale:(sizes[index]*2)/100
      }
    }
  });
  ball.sizeIndex = index;
  return ball;
}

/* ===== スポーン ===== */
function spawnBall(){
  if(gameOver) return;
  currentBall = createBall(window.innerWidth/2,120,0);
  World.add(world,currentBall);
}
spawnBall();

/* ===== 落下 ===== */
function dropBall(){
  currentBall = null;
  setTimeout(spawnBall,400);
}
document.addEventListener("click",()=>{ if(currentBall && !isMobile) dropBall(); });
document.addEventListener("touchend",()=>{ if(currentBall && isMobile) dropBall(); });

/* ===== 合体 ===== */
Events.on(engine,"collisionStart",e=>{
  e.pairs.forEach(pair=>{
    const a = pair.bodyA;
    const b = pair.bodyB;
    if(a.sizeIndex!==undefined && b.sizeIndex!==undefined &&
       a!==currentBall && b!==currentBall &&
       a.sizeIndex===b.sizeIndex &&
       a.sizeIndex < sizes.length-1){

        World.remove(world,[a,b]);
        const newBall = createBall(a.position.x,a.position.y,a.sizeIndex+1);
        World.add(world,newBall);

        score += (a.sizeIndex+1)*10;
        scoreEl.textContent = score;
    }
  });
});

/* ===== 安定型ゲームオーバー判定 ===== */
Events.on(engine,"afterUpdate",()=>{
  if(gameOver) return;

  let over = false;

  world.bodies.forEach(body=>{
    if(body.sizeIndex!==undefined){
      if(body.position.y < cupY - cupHeight/2 - 40){
        over = true;
      }
    }
  });

  if(over){
    overTimer++;
    if(overTimer > 120){ // 約2秒
      endGame();
    }
  }else{
    overTimer = 0;
  }
});

function endGame(){
  gameOver = true;
  panel.style.display="block";
}

/* ===== ランキング ===== */
function sendScore(){
  const name = document.getElementById("playerName").value || "名無し";

  let ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
  ranking.push({name,score});
  ranking.sort((a,b)=>b.score-a.score);
  ranking = ranking.slice(0,10);
  localStorage.setItem("ranking",JSON.stringify(ranking));
  updateRanking();

  restartGame();
}

function updateRanking(){
  const ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
  const list = document.getElementById("rankList");
  list.innerHTML="";
  ranking.forEach((r,i)=>{
    list.innerHTML += `<div>${i+1}. ${r.name} - ${r.score}</div>`;
  });
}
updateRanking();

/* ===== 完全リセット ===== */
function restartGame(){
  panel.style.display="none";
  score = 0;
  scoreEl.textContent = 0;
  gameOver = false;
  overTimer = 0;

  world.bodies.slice().forEach(b=>{
    if(!b.isStatic) World.remove(world,b);
  });

  spawnBall();
}
</script>
</body>
</html>
