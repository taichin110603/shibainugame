<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柴犬ボールゲーム</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f2f2f2;
  text-align:center;
}

#gameArea{
  margin-top:30px;
}

#gameOverScreen{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

#gameOverBox{
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input{
  width:90%;
  padding:8px;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:8px 20px;
}

#ranking{
  margin-top:30px;
  background:white;
  padding:15px;
  width:300px;
  margin-left:auto;
  margin-right:auto;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>柴犬ボールゲーム</h1>

<div id="gameArea">
  <p>スコア: <span id="score">0</span></p>
  <button onclick="simulateGameOver()">テストゲームオーバー</button>
</div>

<div id="ranking">
  <h3>🌎 世界ランキング TOP10</h3>
  <ol id="rankingList"></ol>
</div>

<!-- ゲームオーバー画面 -->
<div id="gameOverScreen">
  <div id="gameOverBox">
    <h2>ゲームオーバー！</h2>
    <p>あなたのスコア: <span id="finalScore"></span></p>
    <input type="text" id="nameInput" maxlength="5" placeholder="名前（5文字まで）">
    <br>
    <button onclick="submitScore()">ランキング登録</button>
    <br>
    <button onclick="retryGame()">リトライ</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzxYXP5Lyz1Ky-q1S1hJO746gIU6VaAy8",
  authDomain: "shibainugame-1865a.firebaseapp.com",
  databaseURL: "https://shibainugame-1865a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "shibainugame-1865a",
  storageBucket: "shibainugame-1865a.firebasestorage.app",
  messagingSenderId: "278247707611",
  appId: "1:278247707611:web:9a04085c0493fd2ee64dfe"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

let score = 0;

////////////////////////////////////////////////////
// テスト用ゲームオーバー
////////////////////////////////////////////////////
window.simulateGameOver = function(){
  score = Math.floor(Math.random()*1000);
  document.getElementById("score").textContent = score;
  document.getElementById("finalScore").textContent = score;
  document.getElementById("gameOverScreen").style.display = "flex";
}

////////////////////////////////////////////////////
// ランキング保存
////////////////////////////////////////////////////
window.submitScore = function(){

  const name = document.getElementById("nameInput").value.trim();

  if(name.length === 0){
    alert("名前を入力してください");
    return;
  }

  if(name.length > 5){
    alert("名前は5文字まで！");
    return;
  }

  const rankingRef = ref(database, "ranking");
  const newRef = push(rankingRef);

  set(newRef,{
    name:name,
    score:score
  });

  alert("登録完了！");
  document.getElementById("gameOverScreen").style.display="none";
}

////////////////////////////////////////////////////
// ランキング読み込み（リアルタイム）
////////////////////////////////////////////////////
function loadRanking(){

  const rankingRef = ref(database, "ranking");

  onValue(rankingRef,(snapshot)=>{

    const data = snapshot.val();
    const rankingList = document.getElementById("rankingList");
    rankingList.innerHTML="";

    if(data){

      const arr = Object.values(data);
      arr.sort((a,b)=> b.score - a.score);

      arr.slice(0,10).forEach(item=>{
        rankingList.innerHTML += `<li>${item.name} - ${item.score}</li>`;
      });
    }

  });
}

loadRanking();

////////////////////////////////////////////////////
// リトライ
////////////////////////////////////////////////////
window.retryGame = function(){
  score = 0;
  document.getElementById("score").textContent = 0;
  document.getElementById("nameInput").value="";
  document.getElementById("gameOverScreen").style.display="none";
}

</script>

</body>
</html>
