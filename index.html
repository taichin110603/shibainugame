<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>INU GAME</title>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>

<style>
body{
  margin:0;
  background:#fff8e7; /* ← あたたかい雰囲気 */
  font-family:sans-serif;
  overflow:hidden;
}

#ui{
  position:absolute;
  right:20px;
  top:20px;
  width:260px;
}

#ranking{
  background:rgba(255,255,255,0.85);
  padding:10px;
  border-radius:15px;
  height:260px;
  overflow-y:auto;
}

button{
  padding:8px 15px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#ffcc88;
  cursor:pointer;
}

button:hover{
  background:#ffbb66;
}
</style>
</head>
<body>

<div id="ui">
<h2>Score: <span id="score">0</span></h2>
<h3>High: <span id="highScore">0</span></h3>

<input id="playerName" placeholder="名前">
<button onclick="sendScore()">スコア送信</button>

<h3>世界ランキング</h3>
<div id="ranking"></div>
</div>

<script type="module">

/* ================= Firebase ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "あなたのAPIキー",
  authDomain: "あなたのID.firebaseapp.com",
  projectId: "あなたのID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= Matter ================= */

const { Engine, Render, Runner, Bodies, World, Events } = Matter;

const engine = Engine.create();
const world = engine.world;

const render = Render.create({
  element: document.body,
  engine: engine,
  options: {
    width: 400,
    height: 600,
    wireframes: false,
    background: "#fff8e7"
  }
});

Render.run(render);
Runner.run(Runner.create(), engine);

/* ================= 容器 ================= */

const ground = Bodies.rectangle(200,580,380,20,{ isStatic:true });
const leftWall = Bodies.rectangle(10,300,20,600,{ isStatic:true });
const rightWall = Bodies.rectangle(390,300,20,600,{ isStatic:true });

World.add(world,[ground,leftWall,rightWall]);

/* ================= ボール設定 ================= */

/* 画像 小さい順対応 */
const ballImages = [
"images/inugame_size1.png",
"images/inugame_size2.png",
"images/inugame_size3.png",
"images/inugame_size4.png",
"images/inugame_size5.png",
"images/inugame_size6.png",
"images/inugame_size7.png",
"images/inugame_size8.png",
"images/inugame_size9.png"
];

/* 前の自然サイズ */
const ballSizes = [16,22,28,36,44,54,66,80,96];

let score = 0;
let currentBall = null;

/* ================= ハイスコア ================= */

let highScore = localStorage.getItem("highScore");
if(!highScore) highScore = 0;
highScore = Number(highScore);
document.getElementById("highScore").innerText = highScore;

/* ================= ボール生成 ================= */

function spawnBall(){
  const sizeIndex = Math.floor(Math.random()*3);
  const radius = ballSizes[sizeIndex];

  currentBall = Bodies.circle(200,50,radius,{
    restitution:0.3,
    render:{
      sprite:{
        texture: ballImages[sizeIndex],
        xScale:(radius*2)/200,
        yScale:(radius*2)/200
      }
    }
  });

  currentBall.sizeIndex = sizeIndex;
  World.add(world,currentBall);
}

spawnBall();

/* ================= クリックで落とす ================= */

document.addEventListener("click",()=>{
  spawnBall();
});

/* ================= 合体処理 ================= */

Events.on(engine,"collisionStart",event=>{
  event.pairs.forEach(pair=>{
    const a = pair.bodyA;
    const b = pair.bodyB;

    if(a.sizeIndex !== undefined && b.sizeIndex !== undefined){
      if(a.sizeIndex === b.sizeIndex && a.sizeIndex < 8){

        const newIndex = a.sizeIndex + 1;
        const radius = ballSizes[newIndex];

        World.remove(world,a);
        World.remove(world,b);

        const newBall = Bodies.circle(a.position.x,a.position.y,radius,{
          render:{
            sprite:{
              texture: ballImages[newIndex],
              xScale:(radius*2)/200,
              yScale:(radius*2)/200
            }
          }
        });

        newBall.sizeIndex = newIndex;
        World.add(world,newBall);

        score += (newIndex+1)*10;
        document.getElementById("score").innerText = score;

        if(score > highScore){
          highScore = score;
          localStorage.setItem("highScore",highScore);
          document.getElementById("highScore").innerText = highScore;
        }
      }
    }
  });
});

/* ================= 世界ランキング送信 ================= */

async function sendScore(){
  const name = document.getElementById("playerName").value;
  if(!name) return alert("名前を入力してね");

  await addDoc(collection(db,"ranking"),{
    name:name,
    score:score,
    date:Date.now()
  });

  await loadRanking();

  alert("送信完了！");

  resetGame(); /* 自動リスタート */
}

/* ================= ランキング表示 ================= */

async function loadRanking(){
  const q = query(
    collection(db,"ranking"),
    orderBy("score","desc"),
    limit(10)
  );

  const snapshot = await getDocs(q);

  const rankingDiv = document.getElementById("ranking");
  rankingDiv.innerHTML="";

  let rank=1;
  snapshot.forEach(doc=>{
    const data = doc.data();
    rankingDiv.innerHTML +=
      rank+"位 "+data.name+" : "+data.score+"<br>";
    rank++;
  });
}

loadRanking();

/* ================= リセット ================= */

function resetGame(){
  World.clear(world,false);
  World.add(world,[ground,leftWall,rightWall]);
  score=0;
  document.getElementById("score").innerText=0;
  spawnBall();
}

</script>
</body>
</html>
