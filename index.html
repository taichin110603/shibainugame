<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>犬スイカゲーム 🐶</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
body,html{
margin:0;
overflow:hidden;
width:100%;
height:100%;
background:linear-gradient(#ffb347,#ffcc70);
font-family:sans-serif;
touch-action:none;
}

#containerVisual{
position:absolute;
left:50%;
transform:translateX(-50%);
border-left:8px solid #8b4513;
border-right:8px solid #8b4513;
border-bottom:8px solid #8b4513;
border-bottom-left-radius:50px;
border-bottom-right-radius:50px;
background:rgba(255,200,150,0.25);
z-index:1;
}

#scoreBox{
position:absolute;
top:15px;
right:15px;
z-index:10;
font-size:18px;
}

#rankingBox{
position:absolute;
top:15px;
left:15px;
width:140px;
font-size:12px;
background:white;
padding:8px;
border-radius:10px;
z-index:10;
}

#gameOver{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
background:white;
padding:20px;
border-radius:10px;
z-index:20;
text-align:center;
}

input{
padding:5px;
font-size:14px;
text-align:center;
}

button{
margin-top:10px;
padding:6px 12px;
border:none;
border-radius:6px;
background:#ff595e;
color:white;
cursor:pointer;
}

canvas{position:absolute;top:0;left:0;}
</style>
</head>
<body>

<div id="containerVisual"></div>

<div id="scoreBox">
Score : <span id="score">0</span><br>
High : <span id="highScore">0</span>
</div>

<div id="rankingBox">
<b>🌍 世界ランキング TOP5</b>
<div id="ranking"></div>
</div>

<div id="gameOver">
<h2>GAME OVER</h2>
<input id="playerName" maxlength="5" placeholder="名前(5文字)">
<br>
<button onclick="submitScore()">スコア送信</button>
<br>
<button onclick="location.reload()">Retry</button>
</div>

<script>
const {Engine,Render,Runner,World,Bodies,Body,Events}=Matter;

const width=window.innerWidth;
const height=window.innerHeight;
const isMobile=width<768;

const engine=Engine.create();
engine.world.gravity.y=1;
const world=engine.world;

const render=Render.create({
element:document.body,
engine,
options:{width,height,wireframes:false,background:"transparent"}
});
Render.run(render);
Runner.run(Runner.create(),engine);

const containerWidth=isMobile?width*0.9:460;
const containerHeight=isMobile?height*0.65:560;

const centerX=width/2;
const topY=isMobile?height*0.25:height*0.2;
const bottomY=topY+containerHeight;

const visual=document.getElementById("containerVisual");
visual.style.width=containerWidth+"px";
visual.style.height=containerHeight+"px";
visual.style.top=topY+"px";

World.add(world,[
Bodies.rectangle(centerX-containerWidth/2,bottomY-containerHeight/2,40,containerHeight,{isStatic:true}),
Bodies.rectangle(centerX+containerWidth/2,bottomY-containerHeight/2,40,containerHeight,{isStatic:true}),
Bodies.rectangle(centerX,bottomY+30,containerWidth,60,{isStatic:true})
]);

const sizes=[20,28,38,50,65,82,105,130,165,205,250];
const mobileScale=isMobile?0.85:1;

const dogImages=[
"images/inugame_size1.png",
"images/inugame_size2.png",
"images/inugame_size3.png",
"images/inugame_size4.png",
"images/inugame_size5.png",
"images/inugame_size6.png",
"images/inugame_size7.png",
"images/inugame_size8.png",
"images/inugame_size9.png",
"images/inugame_size10.png",
"images/inugame_size11.png"
];

let currentBall=null;
let score=0;
let highScore=localStorage.getItem("highScore")||0;
let isGameOver=false;

document.getElementById("highScore").innerText=highScore;

function createBall(sizeIndex,x,y){
const radius=sizes[sizeIndex]*mobileScale;
const texture=dogImages[sizeIndex];

const ball=Bodies.circle(x,y,radius,{
restitution:0.2,
friction:0.3,
render:{sprite:{texture:texture}}
});

const img=new Image();
img.src=texture;
img.onload=function(){
const scale=(radius*2)/img.width;
ball.render.sprite.xScale=scale;
ball.render.sprite.yScale=scale;
};

ball.sizeIndex=sizeIndex;
return ball;
}

function spawnBall(){
if(isGameOver) return;
const sizeIndex=Math.floor(Math.random()*3);
currentBall=createBall(sizeIndex,centerX,topY);
Body.setStatic(currentBall,true);
World.add(world,currentBall);
}
spawnBall();

function moveBall(x){
if(!currentBall||isGameOver) return;
const min=centerX-containerWidth/2+currentBall.circleRadius;
const max=centerX+containerWidth/2-currentBall.circleRadius;
x=Math.max(min,Math.min(max,x));
Body.setPosition(currentBall,{x:x,y:topY});
}

function dropBall(){
if(!currentBall||isGameOver) return;
Body.setStatic(currentBall,false);
currentBall=null;
setTimeout(spawnBall,500);
}

window.addEventListener("mousemove",e=>{
if(!isMobile) moveBall(e.clientX);
});

window.addEventListener("click",()=>{
if(!isMobile) dropBall();
});

window.addEventListener("touchmove",e=>{
if(isMobile) moveBall(e.touches[0].clientX);
},{passive:false});

window.addEventListener("touchend",()=>{
if(isMobile) dropBall();
});

Events.on(engine,"collisionStart",e=>{
e.pairs.forEach(pair=>{
const a=pair.bodyA;
const b=pair.bodyB;
if(a.sizeIndex===undefined||b.sizeIndex===undefined) return;
if(a.sizeIndex!==b.sizeIndex) return;
if(a.isMerging||b.isMerging) return;

a.isMerging=true;
b.isMerging=true;

const newSize=a.sizeIndex+1;
if(newSize>=sizes.length) return;

const newBall=createBall(newSize,
(a.position.x+b.position.x)/2,
(a.position.y+b.position.y)/2
);

World.remove(world,a);
World.remove(world,b);
World.add(world,newBall);

score+=(newSize+1)*10;
document.getElementById("score").innerText=score;

if(score>highScore){
highScore=score;
localStorage.setItem("highScore",highScore);
document.getElementById("highScore").innerText=highScore;
}
});
});

Events.on(engine,"afterUpdate",()=>{
if(isGameOver) return;
world.bodies.forEach(body=>{
if(body.sizeIndex!==undefined){
if(body.position.y - body.circleRadius > height){
isGameOver=true;
document.getElementById("gameOver").style.display="block";
}
}
});
});
</script>

</body>
</html>
