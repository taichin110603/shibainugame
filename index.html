<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shiba Inu Game</title>
<script src="matter.min.js"></script>

<style>
  body{
    margin:0;
    background:#e6f7ff;
    font-family:sans-serif;
    text-align:center;
  }

  #ui{
    position:absolute;
    right:30px;
    top:30px;
    font-size:22px;
    font-weight:bold;
    z-index:10;
  }

  canvas{
    display:block;
    margin:0 auto;
  }
</style>
</head>

<body>

<div id="ui">
  SCORE: <span id="score">0</span>
</div>

<script>
const { Engine, Render, Runner, Bodies, World, Events } = Matter;

// ===== エンジン =====
const engine = Engine.create();
const world = engine.world;

// ===== 描画 =====
const render = Render.create({
  element: document.body,
  engine: engine,
  options:{
    width:500,
    height:700,
    wireframes:false,
    background:"#e6f7ff"
  }
});

Render.run(render);
Runner.run(Runner.create(), engine);

// ===== 容器設定 =====
const wallThickness = 20;
const containerWidth = 320;
const containerHeight = 500;
const centerX = 250;
const bottomY = 650;

// 床
const floor = Bodies.rectangle(
  centerX,
  bottomY,
  containerWidth,
  wallThickness,
  {
    isStatic:true,
    render:{
      fillStyle:"rgba(150,200,255,0.6)",
      strokeStyle:"#3399ff",
      lineWidth:4
    }
  }
);

// 左壁
const leftWall = Bodies.rectangle(
  centerX - containerWidth/2,
  bottomY - containerHeight/2,
  wallThickness,
  containerHeight,
  {
    isStatic:true,
    render:{
      fillStyle:"rgba(150,200,255,0.6)",
      strokeStyle:"#3399ff",
      lineWidth:4
    }
  }
);

// 右壁
const rightWall = Bodies.rectangle(
  centerX + containerWidth/2,
  bottomY - containerHeight/2,
  wallThickness,
  containerHeight,
  {
    isStatic:true,
    render:{
      fillStyle:"rgba(150,200,255,0.6)",
      strokeStyle:"#3399ff",
      lineWidth:4
    }
  }
);

World.add(world, [floor, leftWall, rightWall]);

// ===== ボール =====
let score = 0;

function createBall(x){
  return Bodies.circle(x, 80, 20, {
    restitution:0.4,
    render:{
      fillStyle:"#b5651d"
    }
  });
}

// 最初のボール
let currentBall = createBall(centerX);
World.add(world, currentBall);

// ===== クリックで追加 =====
document.addEventListener("click", function(e){

  // キャンバス位置を取得
  const rect = render.canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;

  const newBall = createBall(x);
  World.add(world, newBall);
});

// ===== 衝突でスコア =====
Events.on(engine,"collisionStart",function(){
  score++;
  document.getElementById("score").innerText = score;
});
</script>

</body>
</html>
