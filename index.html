<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, push, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

// Firebase初期化
const firebaseConfig={
  apiKey:"AIzaSyDzxYXP5Lyz1Ky-q1S1hJO746gIU6VaAy8",
  authDomain:"shibainugame-1865a.firebaseapp.com",
  databaseURL:"https://shibainugame-1865a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"shibainugame-1865a",
  storageBucket:"shibainugame-1865a.appspot.com",
  messagingSenderId:"278247707611",
  appId:"1:278247707611:web:9a04085c0493fd2ee64dfe"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

// 🔹 スコア送信
window.submitScore=function(){
  const name=document.getElementById("playerName").value||"名無し";
  push(ref(db,"ranking"),{
    name:name,
    score:window.finalScore,
    time:Date.now()
  });

  // 送信後そのまま自動リトライ
  setTimeout(()=>location.reload(),500);
};

// 🔹 TOP5表示（上位5人のみ）
const rankingRef=query(ref(db,"ranking"),orderByChild("score"),limitToLast(5));

onValue(rankingRef,(snapshot)=>{
  const box=document.getElementById("ranking");
  box.innerHTML="";
  const data=[];
  snapshot.forEach(child=>data.push(child.val()));
  data.reverse(); // 高得点順

  data.forEach((item,i)=>{
    if(i===0){
      box.innerHTML+="🏆 <span style='color:gold'>"+item.name+" - "+item.score+"</span><br>";
    }else{
      box.innerHTML+=(i+1)+"位 "+item.name+" - "+item.score+"<br>";
    }
  });
});
</script>
